name: Build and deploy Jekyll site

on:
  # Rebuild on every push to the default branch
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions needed to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment. Do NOT cancel an in-progress run — a
# canceled Pages deployment fails ("Deployment failed, try again later"),
# so queue new runs instead and let production deploys finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          # Match .ruby-version so CI and local stay in sync
          ruby-version: "4.0.5"
          bundler-cache: true # runs `bundle install` and caches gems

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        # baseurl is injected from the Pages config so links resolve correctly
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
